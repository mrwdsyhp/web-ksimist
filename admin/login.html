<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — KSI Mist Admin</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Tailwind Output -->
    <link href="./output.css" rel="stylesheet">
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center px-4">

    <!-- Background decorative blobs -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full opacity-10"
            style="background: radial-gradient(circle, #8B1A1A, transparent)"></div>
        <div class="absolute -bottom-40 -right-40 w-96 h-96 rounded-full opacity-10"
            style="background: radial-gradient(circle, #D4AF37, transparent)"></div>
    </div>

    <div class="relative w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4"
                style="background: linear-gradient(135deg, #8B1A1A, #5e1111); box-shadow: 0 8px 32px rgba(139,26,26,0.4)">
                <i class="fas fa-shield-alt text-2xl text-white"></i>
            </div>
            <h1 class="logo-text text-3xl tracking-widest" style="color: #D4AF37">KSI MIST</h1>
            <p class="text-gray-400 text-sm mt-1 tracking-wider">Admin Dashboard</p>
        </div>

        <!-- Card -->
        <div class="bg-gray-800 border border-gray-700 rounded-2xl p-8 shadow-2xl">
            <h2 class="text-xl font-bold text-white mb-1">Masuk ke Panel Admin</h2>
            <p class="text-gray-400 text-sm mb-6">Masukkan kredensial akun administrator kamu</p>

            <!-- Alert error -->
            <div id="alert-error"
                class="hidden mb-4 flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium"
                style="background: rgba(139,26,26,0.2); border: 1px solid rgba(139,26,26,0.4); color: #f5a3a3;">
                <i class="fas fa-exclamation-circle flex-shrink-0"></i>
                <span id="alert-error-msg">Username atau password salah.</span>
            </div>

            <form id="form-login" class="space-y-5">
                <!-- Username -->
                <div>
                    <label for="username" class="form-label">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-gray-500">
                            <i class="fas fa-user text-sm"></i>
                        </div>
                        <input type="text" id="username" name="username"
                            class="form-control pl-10" placeholder="admin"
                            autocomplete="username" required>
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="form-label">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-gray-500">
                            <i class="fas fa-lock text-sm"></i>
                        </div>
                        <input type="password" id="password" name="password"
                            class="form-control pl-10 pr-10" placeholder="••••••••"
                            autocomplete="current-password" required>
                        <button type="button" id="toggle-password"
                            class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-gray-500 hover:text-gray-300 transition-colors">
                            <i class="fas fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember me -->
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2.5 cursor-pointer">
                        <input type="checkbox" id="remember-me"
                            class="w-4 h-4 rounded border-gray-600 bg-gray-700 cursor-pointer"
                            style="accent-color: #8B1A1A;">
                        <span class="text-sm text-gray-300">Ingat saya</span>
                    </label>
                </div>

                <!-- Submit -->
                <button type="submit" id="btn-login"
                    class="btn-primary w-full justify-center py-3 text-base mt-2">
                    <i class="fas fa-sign-in-alt"></i>
                    Masuk
                </button>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-gray-600 mt-6">
            &copy; 2026 KSI Mist FMIPA UNY. Hak akses terbatas.
        </p>
    </div>

    <script src="./login.js"></script>
</body>
</html>
